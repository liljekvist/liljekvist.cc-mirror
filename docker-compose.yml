services:
  web:
    image: ${REGISTRY_IMAGE:-registry.liljekvist.cc/liljekvist/liljekvist.cc}:${IMAGE_TAG:-latest}
    container_name: liljekvist-cc-mainpage
    restart: unless-stopped

    ports:
      - "127.0.0.1:3000:3000"

    deploy:
      resources:
        limits:
          cpus: "1.0"
          memory: 128M

    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:3000/ || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s



