# ─────────────────────────────────────────────────────────────────────────────
# GitLab CI/CD — liljekvist-cc-mainpage
#
# Stages:
#   build  → compile release binary with Rust, store as artifact
#   docker → build a lean runtime image and push to GitLab Container Registry
#   deploy → pull the new image and restart the service via the host Docker socket
#
# Deployment workflow:
#   • Push to main/master → builds image tagged with commit SHA.
#     Deploy job is available as a *manual* gate in the pipeline UI.
#   • Push a semver tag (e.g. git tag v1.2.3 && git push --tags) →
#     builds image tagged with the version and deploys automatically.
#
# No CI/CD variables required — deployment uses the host Docker socket directly.
# ─────────────────────────────────────────────────────────────────────────────

# Prevent duplicate pipelines: only run for MRs, the default branch, and semver tags.
workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

stages:
  - build
  - docker
  - deploy

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  REGISTRY_IMAGE: "${CI_REGISTRY_IMAGE}"

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — build
# Runs on MRs too so the binary is validated before merge.
# ─────────────────────────────────────────────────────────────────────────────
build:
  stage: build
  image: rust:latest
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry
      - .cargo/git
      - target/
  script:
    - cargo build --release --locked
  artifacts:
    name: "binary-${CI_COMMIT_SHORT_SHA}"
    paths:
      - target/release/liljekvist-cc-mainpage
      - templates/
    expire_in: 1 hour

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — docker
# Skipped for MR pipelines — image publishing only happens on real commits.
# IMAGE_TAG is the semver tag for releases, or the commit SHA for branch builds.
# ─────────────────────────────────────────────────────────────────────────────
docker:
  stage: docker
  image: docker:27
  needs:
    - job: build
      artifacts: true
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
      docker build \
        --tag "${REGISTRY_IMAGE}:${IMAGE_TAG}" \
        --tag "${REGISTRY_IMAGE}:latest" \
        .
      docker push "${REGISTRY_IMAGE}:${IMAGE_TAG}"
      docker push "${REGISTRY_IMAGE}:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — deploy
# Uses the host Docker socket directly — no SSH required.
# Pulls the new image and restarts the service using this repo's compose file.
# The project name is pinned so compose always manages the same containers
# regardless of which directory the CI job runs in.
#
# Semver tag pipelines → deploys automatically after docker stage succeeds.
# Default branch pipelines → manual gate: click ▶ in the pipeline UI to deploy.
# ─────────────────────────────────────────────────────────────────────────────
deploy:
  stage: deploy
  image: docker:27
  needs:
    - job: docker
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - |
      REGISTRY_IMAGE="${REGISTRY_IMAGE}" \
      IMAGE_TAG="${IMAGE_TAG}" \
      docker compose --project-name "${CI_PROJECT_NAME}" pull
    - |
      REGISTRY_IMAGE="${REGISTRY_IMAGE}" \
      IMAGE_TAG="${IMAGE_TAG}" \
      docker compose --project-name "${CI_PROJECT_NAME}" up -d --remove-orphans
    - docker image prune -f
  environment:
    name: production
    url: https://liljekvist.cc
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
