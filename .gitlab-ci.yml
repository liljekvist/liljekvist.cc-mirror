# ─────────────────────────────────────────────────────────────────────────────
# GitLab CI/CD — liljekvist-cc-mainpage
#
# Stages:
#   build  → compile release binary with Rust, store as artifact
#   docker → build a lean runtime image and push to GitLab Container Registry
#   deploy → SSH into the VPS, pull the new image, restart docker compose
#
# Required CI/CD variables (Settings → CI/CD → Variables):
#   DEPLOY_HOST   — VPS hostname or IP          (e.g. liljekvist.cc)
#   DEPLOY_USER   — SSH user on the VPS         (e.g. deploy)
#   DEPLOY_KEY    — private SSH key (File type, protected)
#   DEPLOY_DIR    — path to docker-compose.yml  (e.g. /srv/liljekvist-cc-mainpage)
# ─────────────────────────────────────────────────────────────────────────────

stages:
  - build
  - docker
  - deploy

# ── Shared variables ──────────────────────────────────────────────────────────
variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"          # cache cargo registry inside the project
  REGISTRY_IMAGE: "${CI_REGISTRY_IMAGE}"          # registry.gitlab.com/<namespace>/<project>
  IMAGE_TAG: "${CI_COMMIT_SHORT_SHA}"             # pin to the exact commit SHA

# ─────────────────────────────────────────────────────────────────────────────
# Stage 1 — build
# Compiles the release binary using the official Rust Docker image.
# The binary and templates are saved as a pipeline artifact consumed by
# the docker stage — no Rust toolchain is needed in the runtime image.
# ─────────────────────────────────────────────────────────────────────────────
build:
  stage: build
  image: rust:latest
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry
      - .cargo/git
      - target/
  script:
    - cargo build --release --locked
  artifacts:
    name: "binary-${CI_COMMIT_SHORT_SHA}"
    paths:
      - target/release/liljekvist-cc-mainpage
      - templates/
    expire_in: 1 hour
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'

# ─────────────────────────────────────────────────────────────────────────────
# Stage 2 — docker
# Builds the runtime image from the pre-compiled artifact and pushes it to
# the GitLab Container Registry with two tags:
#   • <commit-sha>  — immutable, used by the deploy stage
#   • latest        — convenience tag for manual pulls
# ─────────────────────────────────────────────────────────────────────────────
docker:
  stage: docker
  image: docker:27
  services:
    - docker:27-dind
  needs:
    - job: build
      artifacts: true
  variables:
    DOCKER_TLS_CERTDIR: "/certs"
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - |
      docker build \
        --tag "${REGISTRY_IMAGE}:${IMAGE_TAG}" \
        --tag "${REGISTRY_IMAGE}:latest" \
        .
    - docker push "${REGISTRY_IMAGE}:${IMAGE_TAG}"
    - docker push "${REGISTRY_IMAGE}:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'

# ─────────────────────────────────────────────────────────────────────────────
# Stage 3 — deploy
# SSHs into the VPS, authenticates with the registry, pulls the new image
# by its exact SHA tag, and restarts the service via docker compose.
# Zero-downtime: compose starts the new container before stopping the old one
# because the healthcheck keeps traffic flowing until the new one is healthy.
# ─────────────────────────────────────────────────────────────────────────────
deploy:
  stage: deploy
  image: alpine:3.19
  needs:
    - job: docker
  before_script:
    - apk add --no-cache openssh-client
    - eval $(ssh-agent -s)
    - chmod 400 "$DEPLOY_KEY"
    - ssh-add "$DEPLOY_KEY"
    - mkdir -p ~/.ssh
    - ssh-keyscan -H "$DEPLOY_HOST" >> ~/.ssh/known_hosts
  script:
    - |
      ssh "${DEPLOY_USER}@${DEPLOY_HOST}" bash -s << EOF
        set -euo pipefail

        # Authenticate against the GitLab registry on the VPS.
        echo "${CI_REGISTRY_PASSWORD}" | \
          docker login -u "${CI_REGISTRY_USER}" --password-stdin "${CI_REGISTRY}"

        cd "${DEPLOY_DIR}"

        # Pull the exact image built in this pipeline.
        REGISTRY_IMAGE="${REGISTRY_IMAGE}" \
        IMAGE_TAG="${IMAGE_TAG}" \
        docker compose pull

        # Restart with zero downtime: bring up new container, then remove old.
        REGISTRY_IMAGE="${REGISTRY_IMAGE}" \
        IMAGE_TAG="${IMAGE_TAG}" \
        docker compose up -d --remove-orphans

        # Clean up dangling images to reclaim disk space.
        docker image prune -f
      EOF
  environment:
    name: production
    url: https://liljekvist.cc
  rules:
    - if: '$CI_COMMIT_BRANCH == "main"'
    - if: '$CI_COMMIT_BRANCH == "master"'

