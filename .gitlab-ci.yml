workflow:
  rules:
    - if: '$CI_PIPELINE_SOURCE == "merge_request_event"'
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

stages:
  - build
  - docker
  - deploy

variables:
  CARGO_HOME: "${CI_PROJECT_DIR}/.cargo"
  REGISTRY_IMAGE: "${CI_REGISTRY_IMAGE}"

build:
  stage: build
  image: rust:latest
  cache:
    key:
      files:
        - Cargo.lock
    paths:
      - .cargo/registry
      - .cargo/git
      - target/
  script:
    - cargo build --release --locked
  artifacts:
    name: "binary-${CI_COMMIT_SHORT_SHA}"
    paths:
      - target/release/liljekvist-cc-mainpage
      - templates/
    expire_in: 1 hour

docker:
  stage: docker
  image: docker:27
  needs:
    - job: build
      artifacts: true
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - echo "$CI_REGISTRY_PASSWORD" | docker login --username "$CI_REGISTRY_USER" --password-stdin "$CI_REGISTRY"
  script:
    - |
      IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
      docker build \
        --tag "${REGISTRY_IMAGE}:${IMAGE_TAG}" \
        --tag "${REGISTRY_IMAGE}:latest" \
        .
      docker push "${REGISTRY_IMAGE}:${IMAGE_TAG}"
      docker push "${REGISTRY_IMAGE}:latest"
  rules:
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'

deploy:
  stage: deploy
  image: docker:27
  needs:
    - job: docker
  variables:
    DOCKER_HOST: unix:///var/run/docker.sock
  before_script:
    - docker login -u "$CI_REGISTRY_USER" -p "$CI_REGISTRY_PASSWORD" "$CI_REGISTRY"
  script:
    - IMAGE_TAG="${CI_COMMIT_TAG:-$CI_COMMIT_SHORT_SHA}"
    - PROJECT_NAME=$(echo "$CI_PROJECT_NAME" | tr '.' '-')
    - |
      REGISTRY_IMAGE="${REGISTRY_IMAGE}" \
      IMAGE_TAG="${IMAGE_TAG}" \
      docker compose --project-name "${PROJECT_NAME}" pull
    - |
      REGISTRY_IMAGE="${REGISTRY_IMAGE}" \
      IMAGE_TAG="${IMAGE_TAG}" \
      docker compose --project-name "${PROJECT_NAME}" up -d --remove-orphans
    - docker image prune -f
  environment:
    name: production
    url: https://liljekvist.cc
  rules:
    - if: '$CI_COMMIT_TAG =~ /^v\d+\.\d+\.\d+/'
      when: on_success
    - if: '$CI_COMMIT_BRANCH == $CI_DEFAULT_BRANCH'
      when: manual
