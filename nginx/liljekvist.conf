###############################################
# HTTP (port 80) - ACME + redirect to HTTPS
###############################################
server {
    listen 80;
    listen [::]:80;
    server_name liljekvist.cc www.liljekvist.cc;

    # ACME Challenge
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        try_files $uri =404;
    }

    # Redirect everything else to HTTPS
    location / {
        return 301 https://$host$request_uri;
    }
}

###############################################
# HTTPS (port 443) - Reverse proxy to Axum
###############################################
server {
    listen 443 ssl http2;
    listen [::]:443 ssl http2;
    server_name liljekvist.cc www.liljekvist.cc;

    # SSL - Managed by Certbot
    ssl_certificate     /etc/letsencrypt/live/liljekvist.cc/fullchain.pem;
    ssl_certificate_key /etc/letsencrypt/live/liljekvist.cc/privkey.pem;
    include /etc/letsencrypt/options-ssl-nginx.conf;
    ssl_dhparam         /etc/letsencrypt/ssl-dhparams.pem;

    # Security headers
    add_header Strict-Transport-Security "max-age=31536000; includeSubDomains" always;
    add_header X-Frame-Options SAMEORIGIN always;
    add_header X-Content-Type-Options nosniff always;
    add_header Referrer-Policy "strict-origin-when-cross-origin" always;
    add_header Permissions-Policy "interest-cohort=()" always;

    # ACME reachable on HTTPS (optional but helpful)
    location ^~ /.well-known/acme-challenge/ {
        root /var/www/_letsencrypt;
        try_files $uri =404;
    }

    # ── WebSocket endpoint (/ws) ─────────────────────────────────────────
    # Must be matched before the generic proxy block so nginx sends the
    # correct Connection / Upgrade headers required for WS handshake.
    location /ws {
        proxy_pass         http://127.0.0.1:3000;

        # WebSocket upgrade headers
        proxy_http_version 1.1;
        proxy_set_header   Upgrade    $http_upgrade;
        proxy_set_header   Connection "upgrade";

        # Forward real client info
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Keep the WS connection alive; raise timeout to survive idle periods.
        proxy_read_timeout  3600s;
        proxy_send_timeout  3600s;
    }

    # ── Regular HTTP traffic ─────────────────────────────────────────────
    location / {
        proxy_pass         http://127.0.0.1:3000;

        proxy_http_version 1.1;
        proxy_set_header   Connection        "";   # keep-alive to upstream
        proxy_set_header   Host              $host;
        proxy_set_header   X-Real-IP         $remote_addr;
        proxy_set_header   X-Forwarded-For   $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;

        # Sensible timeouts for a fast Axum service
        proxy_connect_timeout 5s;
        proxy_read_timeout    30s;
        proxy_send_timeout    30s;

        # Buffer responses so slow clients don't hold upstream connections open.
        proxy_buffering    on;
        proxy_buffer_size  8k;
        proxy_buffers      16 8k;
    }
}

