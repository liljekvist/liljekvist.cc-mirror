<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>{% block title %}liljekvist.cc{% endblock title %}</title>
  <link rel="icon" type="image/x-icon"       href="/assets/favicon.ico" />
  <link rel="icon" type="image/png" sizes="16x16"  href="/assets/favicon-16x16.png" />
  <link rel="icon" type="image/png" sizes="32x32"  href="/assets/favicon-32x32.png" />
  <link rel="apple-touch-icon"               href="/assets/apple-touch-icon.png" />
  <link rel="icon" type="image/png" sizes="192x192" href="/assets/android-chrome-192x192.png" />
  <link rel="icon" type="image/png" sizes="512x512" href="/assets/android-chrome-512x512.png" />
  <link rel="manifest"                        href="/assets/site.webmanifest" />
  <style>
    /* ── Reset & base ──────────────────────────────────────────────────── */
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    :root {
      --bg:       #0d1117;
      --fg:       #c9d1d9;
      --green:    #3fb950;
      --blue:     #58a6ff;
      --yellow:   #d29922;
      --red:      #f85149;
      --cyan:     #39c5cf;
      --dim:      #484f58;
      --font:     'Cascadia Code', 'Fira Code', 'JetBrains Mono', 'Consolas', monospace;
    }

    html, body {
      background: var(--bg);
      color: var(--fg);
      font-family: var(--font);
      font-size: clamp(13px, 1.5vw, 16px);
      line-height: 1.6;
      min-height: 100vh;
    }

    /* ── Terminal container ─────────────────────────────────────────────── */
    #terminal {
      max-width: 900px;
      margin: 0 auto;
      padding: 1.5rem 1rem 6rem;
    }

    /* ── Output lines ───────────────────────────────────────────────────── */
    #output .line {
      white-space: pre-wrap;
      word-break: break-word;
    }

    /* ── Input row ──────────────────────────────────────────────────────── */
    #input-row {
      display: flex;
      align-items: center;
      flex-wrap: nowrap;
      margin-top: 0.1rem;
    }

    #cmd-input {
      background: transparent;
      border: none;
      outline: none;
      color: var(--fg);
      font-family: var(--font);
      font-size: inherit;
      flex: 1;
      caret-color: var(--green);
      min-width: 0;
    }

    /* ── Prompt colours ─────────────────────────────────────────────────── */
    .prompt-host   { color: var(--green);  }
    .prompt-sep    { color: var(--dim);    }
    .prompt-dir    { color: var(--blue);   }
    .prompt-dollar { color: var(--fg);     }
    .cmd-echo      { color: var(--fg);     }

    /* ── Output colours ─────────────────────────────────────────────────── */
    .out  { color: var(--fg);    }
    .kw   { color: var(--cyan);  font-weight: bold; }
    .cmd  { color: var(--green); }
    .arg  { color: var(--yellow);}
    .err  { color: var(--red);   }
    .dim  { color: var(--dim);   }
    .lnk  { color: var(--blue);  text-decoration: underline; cursor: pointer; }

    a { color: var(--blue); }
    a:hover { color: var(--cyan); }

    /* ── Blinking cursor on the input ───────────────────────────────────── */
    #cmd-input::placeholder { color: transparent; }

    /* ── ASCII banner ───────────────────────────────────────────────────── */
    pre.ascii-banner {
      font-family: var(--font);
      font-size: clamp(6px, 1.1vw, 13px);
      line-height: 1.2;
      color: var(--green);
      overflow-x: auto;
      white-space: pre;
      margin: 0;
      padding: 0;
    }

    /* ── Mobile: keep the input bar fixed at bottom ─────────────────────── */
    @media (max-width: 600px) {
      #input-row {
        position: fixed;
        bottom: 0;
        left: 0;
        right: 0;
        background: var(--bg);
        padding: 0.5rem 1rem;
        border-top: 1px solid var(--dim);
      }
      #terminal { padding-bottom: 3.5rem; }
    }
  </style>
</head>
<body>
  {% block content %}{% endblock content %}
</body>
</html>
